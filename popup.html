<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header">
      <h1>📨 AMIS Chat Sender</h1>
      <div id="user-bar" class="muted">Đang tải...</div>
    </div>

    <!-- Sender info (hidden — tự động lấy từ localStorage) -->
    <div class="section hidden">
      <div class="form-row">
        <div class="form-group flex-1">
          <label>Sender ID</label>
          <input type="text" id="sender-id-input" placeholder="GUID sender">
        </div>
        <div class="form-group flex-1">
          <label>Sender Name</label>
          <input type="text" id="sender-name-input" placeholder="Tên người gửi">
        </div>
      </div>
    </div>

    <!-- Conversations -->
    <div class="section" id="section-conversations">
      <label class="section-label">Conversations</label>
      <div class="form-row">
        <input type="text" id="conv-id" placeholder="Conversation ID" class="flex-2">
        <input type="text" id="conv-name" placeholder="Tên" class="flex-1">
        <button id="btn-add" class="btn btn-sm btn-primary">+ Thêm</button>
      </div>
      <div id="conv-list" class="item-list">
        <div class="empty-hint">Chưa có conversation nào.</div>
      </div>
    </div>

    <!-- Clipboard -->
    <div class="section">
      <label class="section-label">📋 Clipboard</label>
      <div class="form-row">
        <button id="btn-read-clipboard" class="btn btn-sm btn-primary">📋 Lấy clipboard</button>
        <button id="btn-paste-page" class="btn btn-sm btn-outline">📤 Update contextData</button>
      </div>
      <div id="clipboard-preview" class="clipboard-preview hidden">
        <pre id="clipboard-text"></pre>
      </div>
    </div>

    <!-- Message + Send -->
    <div class="section" id="section-send">
      <textarea id="msg-content" rows="2" placeholder="Nội dung tin nhắn..."></textarea>
      <div class="action-row">
        <button id="btn-copy-send" class="btn btn-copy-send">📋 Copy & Gửi Context</button>
        <button id="btn-send" class="btn btn-send">▶ Gửi</button>
      </div>
      <div id="send-result"></div>
    </div>

    <!-- Error banner -->
    <div id="error-banner" class="error-banner hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
